name: Feature Request
description: Suggest a new feature or enhancement for AgentForge
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe the problem you are trying to solve and your proposed solution.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of AgentForge does this relate to?
      options:
        - CLI commands
        - Runtime / Daemon
        - Dashboard (web UI)
        - Channels (HTTP, Discord, Telegram)
        - Agent configuration
        - Memory / Storage
        - Tools / Skills
        - Security
        - Developer experience
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Why is it needed?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you have considered

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important -- affects my workflow
        - Critical -- blocking my use case

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or examples
