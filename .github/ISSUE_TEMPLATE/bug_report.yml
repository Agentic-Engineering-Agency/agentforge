name: Bug Report
description: Report a bug in AgentForge
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

        **Security vulnerabilities:** Do NOT use this form. See [SECURITY.md](../../SECURITY.md) for responsible disclosure instructions.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is
      placeholder: "When I run `agentforge chat`, the daemon returns..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Run `agentforge create my-project`
        2. Run `agentforge start`
        3. Run `agentforge chat`
        4. Send a message containing "..."
        5. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error messages if applicable)
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## Environment"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: "Run `node --version`"
      placeholder: "v22.0.0"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AgentForge Version
      description: "Run `agentforge --version`"
      placeholder: "0.12.23"
    validations:
      required: true

  - type: input
    id: convex-deployment
    attributes:
      label: Convex Deployment
      description: "Your deployment name (from `agentforge status` or .env). Leave blank if not applicable."
      placeholder: "hallowed-stork-858"

  - type: dropdown
    id: package
    attributes:
      label: Affected Package
      description: Which package is affected?
      options:
        - CLI (`@agentforge-ai/cli`)
        - Runtime / Daemon (`@agentforge-ai/runtime`)
        - Core (`@agentforge-ai/core`)
        - Dashboard (web UI)
        - Convex (data layer)
        - Multiple / Unsure
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output (daemon logs, CLI output, browser console)
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context or screenshots
