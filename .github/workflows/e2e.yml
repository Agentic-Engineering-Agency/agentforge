# E2E Integration Tests — Framework → Cloud
#
# Runs the full E2E test suite that validates:
#   1. Local agent execution (unit-level with mocked LLM)
#   2. CLI deployment pipeline
#   3. Cloud API execution (requires AGENTFORGE_CLOUD_URL secret)
#   4. Thread continuity
#   5. Tool/workspace transfer
#
# Triggers: PR to main, push to main, manual dispatch

name: E2E Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/core/**'
      - 'packages/cli/**'
      - 'convex/**'
      - 'tests/e2e/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/core/**'
      - 'packages/cli/**'
      - 'convex/**'
      - 'tests/e2e/**'
  workflow_dispatch:
    inputs:
      run_cloud_tests:
        description: 'Run Cloud integration tests (requires AGENTFORGE_CLOUD_URL secret)'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '22'

jobs:
  # ── Stage 1: Local tests (no infra needed) ──────────────────────────
  local-tests:
    name: Local Agent & Tool Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run local E2E tests
        run: |
          cd tests/e2e
          npx vitest run local.test.ts --config vitest.config.ts
        env:
          NODE_ENV: test
          E2E_TEST: '1'

  # ── Stage 2: Cloud tests (optional — requires external infra) ───────
  cloud-tests:
    name: Cloud Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: local-tests
    # Only run cloud tests when manually triggered with run_cloud_tests=true
    # and when AGENTFORGE_CLOUD_URL is available as a secret
    if: ${{ github.event.inputs.run_cloud_tests == 'true' && secrets.AGENTFORGE_CLOUD_URL != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run deploy E2E tests
        run: |
          cd tests/e2e
          npx vitest run deploy.test.ts --config vitest.config.ts
        env:
          NODE_ENV: test
          E2E_TEST: '1'
          AGENTFORGE_CLOUD_URL: ${{ secrets.AGENTFORGE_CLOUD_URL }}
          AGENTFORGE_TEST_API_KEY: ${{ secrets.AGENTFORGE_TEST_API_KEY }}

      - name: Run Cloud execution E2E tests
        run: |
          cd tests/e2e
          npx vitest run cloud-execution.test.ts --config vitest.config.ts
        env:
          NODE_ENV: test
          E2E_TEST: '1'
          AGENTFORGE_CLOUD_URL: ${{ secrets.AGENTFORGE_CLOUD_URL }}
          AGENTFORGE_TEST_API_KEY: ${{ secrets.AGENTFORGE_TEST_API_KEY }}

      - name: Run thread continuity E2E tests
        run: |
          cd tests/e2e
          npx vitest run threads.test.ts --config vitest.config.ts
        env:
          NODE_ENV: test
          E2E_TEST: '1'
          AGENTFORGE_CLOUD_URL: ${{ secrets.AGENTFORGE_CLOUD_URL }}
          AGENTFORGE_TEST_API_KEY: ${{ secrets.AGENTFORGE_TEST_API_KEY }}

  # ── Stage 3: Full local suite with coverage ──────────────────────────
  coverage:
    name: E2E Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: local-tests
    if: always() && needs.local-tests.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run local test suite with coverage
        run: |
          cd tests/e2e
          npx vitest run local.test.ts --config vitest.config.ts --coverage
        env:
          NODE_ENV: test
          E2E_TEST: '1'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage
          path: tests/e2e/coverage/
          retention-days: 14

      - name: Coverage summary
        run: |
          echo "## E2E Coverage Report" >> $GITHUB_STEP_SUMMARY
          if [ -f tests/e2e/coverage/coverage-summary.json ]; then
            cat tests/e2e/coverage/coverage-summary.json | jq -r '.total | "- Statements: \(.statements.pct)%\n- Branches: \(.branches.pct)%\n- Functions: \(.functions.pct)%\n- Lines: \(.lines.pct)%"' >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage report not generated" >> $GITHUB_STEP_SUMMARY
          fi
