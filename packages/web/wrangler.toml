name = "agentforge-web"
compatibility_date = "2024-01-01"

# Cloudflare Pages configuration
pages_build_output_dir = ".vinxi/output/public"

[env.production]
name = "agentforge-web"

[env.production.vars]
ENVIRONMENT = "production"

# R2 Bucket bindings (for file storage)
[[env.production.r2_buckets]]
binding = "FILES"
bucket_name = "agentforge-files"

# KV Namespace bindings (optional, for caching)
[[env.production.kv_namespaces]]
binding = "CACHE"
id = "your-kv-namespace-id"

# Environment variables (secrets should be set via dashboard or wrangler secret)
# CONVEX_URL, API keys, etc. should be set as secrets
