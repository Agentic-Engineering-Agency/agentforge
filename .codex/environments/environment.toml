# Codex Cloud Environment — AgentForge
# Configures the sandbox for OpenAI Codex cloud sessions.
# Setup script runs WITH internet; agent phase runs WITHOUT internet.
version = 1
name = "agentforge"

[setup]
# Install all dependencies during setup (internet available).
# Agent phase has NO internet, so everything must be installed here.
script = """
#!/bin/bash
set -e

# Install pnpm if not available
command -v pnpm >/dev/null 2>&1 || corepack enable && corepack prepare pnpm@latest --activate

# Install all workspace dependencies
pnpm install --frozen-lockfile 2>/dev/null || pnpm install

# Sync Convex templates across all locations
pnpm sync-templates 2>/dev/null || true

# Build packages so imports resolve during agent phase
pnpm build 2>/dev/null || true

echo "AgentForge setup complete: $(node -v), pnpm $(pnpm -v)"
"""

[[actions]]
name = "Typecheck"
icon = "check"
command = '''
pnpm typecheck
'''

[[actions]]
name = "Test"
icon = "test"
command = '''
pnpm test
'''

[[actions]]
name = "Lint"
icon = "lint"
command = '''
pnpm lint
'''

[[actions]]
name = "Full QA"
icon = "run"
command = '''
pnpm typecheck && pnpm test && pnpm lint
'''
