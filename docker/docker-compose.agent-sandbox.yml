# ─────────────────────────────────────────────────────────────────────────
# AgentForge Agent Sandbox — Docker Compose
# ─────────────────────────────────────────────────────────────────────────
#
# Usage:
#   docker compose -f docker/docker-compose.agent-sandbox.yml up -d
#   docker compose -f docker/docker-compose.agent-sandbox.yml exec sandbox detect-agents
#   docker compose -f docker/docker-compose.agent-sandbox.yml exec sandbox run-agent codex "Fix the bug"
#
# Environment:
#   Copy .env.example to .env and fill in your API keys.
#
# ─────────────────────────────────────────────────────────────────────────
version: "3.9"

services:
  sandbox:
    build:
      context: ../
      dockerfile: docker/Dockerfile.agent-sandbox
    container_name: agentforge-sandbox
    environment:
      # Agent API Keys (set in .env file)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # AgentForge Configuration
      - AGENTFORGE_SANDBOX=true
      - AGENTFORGE_WORKSPACE=/workspace
      - NODE_OPTIONS=--max-old-space-size=4096
    volumes:
      - ../:/workspace:rw
      - agent-cache:/home/agent/.cache
      - agent-config:/home/agent/.config
    working_dir: /workspace
    stdin_open: true
    tty: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"
        reservations:
          memory: 2G
          cpus: "1"

volumes:
  agent-cache:
    driver: local
  agent-config:
    driver: local
